<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>images and media</title>
    <style>
        body{
            background-image: url('./cat1.jpg');
            background-repeat: no-repeat;
            background-attachment:fixed ;
            background-size: cover;
        }
        figure{
            width: 300px;
            border: 4px solid red;
        }
        img{
            border-radius: 50;
            width: 100%;
        }
        p{
            margin: 0;
        }
        .gallery{
            width: 200px;
            float: left;
        }
        video{
            width: 100%;
        }

    </style>
</head>
<body>
    <figure>
        <img src="cat1.jpg" alt="A cute cat" >
        <figcaption>two fine cats sitting beside each other </figcaption>
    </figure>
    
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Cumque mollitia ut eum quia, explicabo eaque omnis est facilis ad dolore!</p>


    <div>
        <audio src="./057.mp3" controls></audio>
        <p>suratul hadid</p>
    </div>

<div class="gallery">
